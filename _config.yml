# Site Settings
locale                   : "en-US"
title                    : "Shayan Majidy"
title_separator          : "-"
name                     : &name "Shayan Majidy"
description              : &description "Quantum physicist at Harvard University"
url                      : https://smajidy.github.io
baseurl                  : ""
repository               : "smajidy.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
atom_feed:
  path                   :

# SEO Related
google_site_verification :
bing_site_verification   :

# Social
twitter:
  username               : &twitter
og_image                 :
social:
  type                   :
  name                   :
  links:

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "Shayan Majidy"
  avatar           : "profile.png"
  bio              : "Banting Postdoctoral Fellow"
  location         : "Harvard University"
  employer         :
  pubmed           :
  googlescholar    : "https://scholar.google.ca/citations?user=rLyCWhoAAAAJ&hl=en"
  email            : "smajidy@fas.harvard.edu"
  researchgate     :
  uri              :
  github           :
  linkedin         : "shayan-majidy"
  twitter          : "ShayanMajidy"
  orcid            :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/New_York

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
